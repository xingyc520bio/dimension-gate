<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>维度之门智教联思 · EduMind AI 演示</title>
<style>

  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#F0F4F0; min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:'DM Sans','PingFang SC',sans-serif; overflow:hidden; }

  .laptop { position:relative; width:900px; }
  .laptop-screen { background:#fff; border-radius:12px; border:1px solid #D4E8D4; overflow:hidden; box-shadow: 0 25px 80px rgba(0,120,60,.08), 0 4px 20px rgba(0,0,0,.04); }
  .laptop-base { width:60%; height:12px; margin:0 auto; background:linear-gradient(180deg,#D8E6D8,#E0ECE0); border-radius:0 0 8px 8px; }

  .topbar { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:#F8FBF8; border-bottom:1px solid #D4E8D4; }
  .topbar-left { display:flex; align-items:center; gap:8px; }
  .wdot { width:8px; height:8px; border-radius:50%; }
  .wdot-r { background:#ff5f57; } .wdot-y { background:#ffbd2e; } .wdot-g { background:#28c840; }
  .topbar-title { font-size:12px; color:#6B8F71; margin-left:12px; font-family:'JetBrains Mono',monospace; }
  .topbar-right { display:flex; gap:6px; align-items:center; }
  .status-dot { width:6px; height:6px; border-radius:50%; background:#22C55E; animation:pulse-dot 2s infinite; }
  .status-text { font-size:11px; color:#6B8F71; font-family:'JetBrains Mono',monospace; }
  @keyframes pulse-dot { 0%,100%{opacity:1;} 50%{opacity:.4;} }

  .app { height:480px; position:relative; overflow:hidden; }
  .screen { position:absolute; inset:0; display:flex; flex-direction:column; opacity:0; pointer-events:none; transition:opacity .5s ease; }
  .screen.active { opacity:1; pointer-events:auto; }

  /* ══ BRAND LOGO ══ */
  .brand-logo { display:flex; align-items:center; gap:7px; }
  .brand-icon { width:28px; height:28px; border-radius:8px; background:linear-gradient(135deg,#4CAF50,#2E7D32); display:flex; align-items:center; justify-content:center; }
  .brand-icon svg { width:16px; height:16px; }
  .brand-name { font-family:'Syne',sans-serif; font-size:14px; font-weight:800; color:#2D5A3D; letter-spacing:-.02em; }
  .brand-sub { font-size:9px; color:#6B8F71; font-family:'JetBrains Mono',monospace; letter-spacing:.03em; }

  /* ══ SCREEN 1 ══ */
  .s1-main { flex:1; display:flex; }
  .s1-sidebar { width:190px; background:#F0F7F0; border-right:1px solid #D4E8D4; display:flex; flex-direction:column; }
  .s1-sidebar-header { padding:14px 16px; border-bottom:1px solid #D4E8D4; }
  .s1-nav { padding:8px; flex:1; }
  .s1-nav-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; margin-bottom:4px; cursor:pointer; transition:all .25s; }
  .s1-nav-item.active { background:#DCF0DC; border:1px solid #A8D8A8; }
  .s1-nav-item:not(.active) { border:1px solid transparent; }
  .s1-nav-icon { width:22px; height:22px; border-radius:6px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
  .s1-nav-icon svg { width:14px; height:14px; }
  .s1-nav-icon.ic-chat { background:rgba(76,175,80,.12); color:#2E7D32; }
  .s1-nav-icon.ic-viz { background:rgba(255,152,0,.12); color:#E65100; }
  .s1-nav-icon.ic-lib { background:rgba(33,150,243,.12); color:#1565C0; }
  .s1-nav-icon.ic-stats { background:rgba(156,39,176,.12); color:#7B1FA2; }
  .s1-nav-text { font-size:12px; font-weight:600; color:#2D5A3D; }
  .s1-nav-desc { font-size:10px; color:#6B8F71; margin-top:2px; }

  .s1-chat { flex:1; display:flex; flex-direction:column; background:#fff; }
  .s1-chat-header { padding:12px 20px; border-bottom:1px solid #E2EEE2; display:flex; align-items:center; justify-content:space-between; }
  .s1-chat-title { font-size:13px; font-weight:700; color:#2D5A3D; }
  .s1-agent-badge { padding:3px 10px; border-radius:20px; font-size:10px; font-weight:600; font-family:'JetBrains Mono',monospace; background:#E8F5E9; color:#2E7D32; border:1px solid #A5D6A7; }

  .s1-messages { flex:1; padding:20px; overflow:hidden; display:flex; flex-direction:column; gap:14px; background:#FAFCFA; }
  .s1-msg { display:flex; gap:10px; align-items:flex-start; opacity:0; transform:translateY(15px); transition:all .4s ease; max-width:92%; }
  .s1-msg.show { opacity:1; transform:translateY(0); }
  .s1-msg-user { align-self:flex-end; flex-direction:row-reverse; }
  .s1-msg-avatar { width:30px; height:30px; border-radius:8px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:13px; }
  .s1-msg-bot .s1-msg-avatar { background:#E8F5E9; }
  .s1-msg-user .s1-msg-avatar { background:#FFF3E0; border-radius:50%; }
  .s1-msg-avatar svg { width:16px; height:16px; }
  .s1-msg-bubble { padding:10px 14px; border-radius:14px; font-size:13px; line-height:1.7; }
  .s1-msg-user .s1-msg-bubble { background:#FFF3E0; color:#4E342E; border:1px solid #FFE0B2; border-top-right-radius:4px; }
  .s1-msg-bot .s1-msg-bubble { background:#E8F5E9; color:#1B5E20; border:1px solid #A5D6A7; border-top-left-radius:4px; }
  .typing-cursor { display:inline-block; width:2px; height:14px; background:#2E7D32; margin-left:2px; animation:blink-cursor .6s infinite; vertical-align:text-bottom; }
  @keyframes blink-cursor { 0%,100%{opacity:1;} 50%{opacity:0;} }

  /* LaTeX-style math */
  .math-block { margin:10px 0; padding:12px 16px; background:#fff; border:1px solid #C8E6C9; border-radius:10px; font-family:'JetBrains Mono',monospace; font-size:13px; color:#1B5E20; line-height:1.8; }
  .math-block .math-label { font-size:10px; color:#6B8F71; letter-spacing:.08em; margin-bottom:6px; font-weight:600; }
  .math-block .math-eq { font-size:14px; color:#2D5A3D; }
  .math-block .math-var { font-style:italic; }
  .math-block sup { font-size:10px; vertical-align:super; }
  .math-block sub { font-size:9px; vertical-align:sub; }
  .math-meta { display:flex; gap:12px; margin-top:8px; font-size:11px; color:#6B8F71; }
  .math-meta span { padding:2px 8px; background:#F1F8F1; border-radius:6px; border:1px solid #E0F0E0; }

  .s1-input { padding:12px 20px; border-top:1px solid #E2EEE2; display:flex; align-items:center; gap:10px; background:#fff; }
  .s1-input-box { flex:1; background:#F5F9F5; border:1px solid #D4E8D4; border-radius:10px; padding:10px 14px; font-size:12px; color:#2D5A3D; cursor:text; transition:all .3s; min-height:38px; display:flex; align-items:center; }
  .s1-input-box.focused { border-color:#4CAF50; box-shadow:0 0 0 3px rgba(76,175,80,.15); }
  .s1-input-box.has-text { color:#2D5A3D; }

  .s1-send { width:34px; height:34px; border-radius:10px; background:#4CAF50; display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px; transition:all .25s; opacity:.5; }
  .s1-send.active { opacity:1; transform:scale(1.05); }

  .s2-interact-btn { margin-top:10px; padding:8px 16px; width:100%; border-radius:10px; background:#fff; border:2px solid #4CAF50; color:#4CAF50; font-size:12px; font-weight:700; cursor:pointer; transition:all .3s; display:flex; align-items:center; justify-content:center; gap:6px; }
  .s2-interact-btn.pulse { animation:btn-pulse 1.5s ease-in-out infinite; }
  @keyframes btn-pulse { 0%,100%{box-shadow:0 0 0 0 rgba(76,175,80,.4);} 50%{box-shadow:0 0 0 8px rgba(76,175,80,0);} }

  /* ══ SCREEN 2 ══ */
  .s2-toolbar { display:flex; align-items:center; gap:10px; padding:10px 20px; background:#F0F7F0; border-bottom:1px solid #D4E8D4; }
  .s2-back { padding:5px 12px; border-radius:8px; background:#fff; border:1px solid #D4E8D4; font-size:11px; color:#4A7A52; cursor:pointer; }
  .s2-title { font-size:13px; font-weight:700; color:#2D5A3D; flex:1; }
  .s2-badge { padding:3px 10px; border-radius:20px; font-size:10px; font-weight:600; background:#E8F5E9; color:#2E7D32; border:1px solid #A5D6A7; font-family:'JetBrains Mono',monospace; }

  .s2-content { flex:1; display:flex; padding:20px; gap:20px; background:#FAFCFA; }
  .s2-viz { flex:1; background:#fff; border-radius:14px; border:1px solid #D4E8D4; overflow:hidden; display:flex; flex-direction:column; }
  .s2-viz-header { padding:12px 16px; border-bottom:1px solid #E8F0E8; display:flex; align-items:center; justify-content:space-between; }
  .s2-viz-title { font-size:12px; font-weight:700; color:#2D5A3D; }
  .s2-viz-tag { font-size:9px; padding:2px 8px; background:#FFF3E0; color:#E65100; border-radius:10px; border:1px solid #FFE0B2; }
  .s2-canvas-area { flex:1; position:relative; overflow:hidden; }
  .math-canvas { width:100%; height:100%; }
  .s2-controls { display:flex; gap:8px; padding:10px 16px; border-top:1px solid #E8F0E8; background:#F8FBF8; }
  .s2-ctrl-btn { padding:6px 14px; border-radius:8px; font-size:11px; font-weight:600; cursor:pointer; transition:all .25s; border:1px solid; }
  .s2-ctrl-play { background:#4CAF50; color:#fff; border-color:#388E3C; }
  .s2-ctrl-step { background:#fff; color:#4CAF50; border-color:#A5D6A7; }
  .s2-ctrl-reset { background:#fff; color:#78909C; border-color:#CFD8DC; }

  .s2-sidebar { width:220px; display:flex; flex-direction:column; gap:12px; }
  .s2-question { background:#fff; border-radius:14px; border:1px solid #D4E8D4; padding:14px; }
  .s2-question h5 { font-size:10px; color:#6B8F71; text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px; font-family:'JetBrains Mono',monospace; }
  .s2-question-text { font-size:12px; color:#2D5A3D; line-height:1.7; font-family:'JetBrains Mono',monospace; }
  .s2-solution { background:#fff; border-radius:14px; border:1px solid #D4E8D4; padding:14px; flex:1; overflow:hidden; }
  .s2-solution h5 { font-size:10px; color:#6B8F71; text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px; font-family:'JetBrains Mono',monospace; }
  .s2-step { display:flex; gap:8px; margin-bottom:8px; opacity:0; transform:translateX(-10px); transition:all .4s ease; }
  .s2-step.show { opacity:1; transform:translateX(0); }
  .s2-step-num { width:20px; height:20px; border-radius:50%; background:#E8F5E9; color:#2E7D32; font-size:10px; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-family:'JetBrains Mono',monospace; }
  .s2-step-text { font-size:11px; color:#4A7A52; line-height:1.5; }
  .s2-step-text strong { color:#2D5A3D; }

  /* ══ SCREEN 3 ══ */
  .s3-header { display:flex; align-items:center; gap:10px; padding:10px 20px; background:#F0F7F0; border-bottom:1px solid #D4E8D4; }
  .s3-back { padding:5px 12px; border-radius:8px; background:#fff; border:1px solid #D4E8D4; font-size:11px; color:#4A7A52; cursor:pointer; }
  .s3-title { font-size:13px; font-weight:700; color:#2D5A3D; flex:1; }
  .s3-search { padding:6px 14px; border-radius:20px; background:#fff; border:1px solid #D4E8D4; font-size:11px; color:#6B8F71; width:180px; }

  .s3-body { flex:1; display:flex; overflow:hidden; }
  .s3-categories { width:150px; background:#F0F7F0; border-right:1px solid #D4E8D4; padding:10px 8px; overflow-y:auto; }
  .s3-cat { display:flex; align-items:center; gap:8px; padding:9px 12px; border-radius:10px; margin-bottom:3px; cursor:pointer; transition:all .25s; font-size:12px; color:#4A7A52; }
  .s3-cat.active { background:#DCF0DC; color:#1B5E20; font-weight:700; border:1px solid #A5D6A8; }
  .s3-cat:not(.active) { border:1px solid transparent; }
  .s3-cat-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .s3-cat-count { margin-left:auto; font-size:10px; color:#6B8F71; font-family:'JetBrains Mono',monospace; }

  .s3-grid-wrap { flex:1; padding:16px; overflow:hidden; }
  .s3-grid-title { font-size:12px; font-weight:700; color:#2D5A3D; margin-bottom:12px; display:flex; align-items:center; gap:6px; }
  .s3-grid-count { font-size:10px; color:#6B8F71; font-family:'JetBrains Mono',monospace; }
  .s3-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
  .s3-card { background:#fff; border:1px solid #E2EEE2; border-radius:12px; overflow:hidden; cursor:pointer; transition:all .3s; opacity:0; transform:translateY(15px); }
  .s3-card.show { opacity:1; transform:translateY(0); }
  .s3-card:hover { border-color:#4CAF50; transform:translateY(-3px); box-shadow:0 8px 24px rgba(76,175,80,.1); }
  .s3-card-preview { height:80px; display:flex; align-items:center; justify-content:center; position:relative; }
  .s3-card-preview .preview-icon { width:36px; height:36px; border-radius:10px; display:flex; align-items:center; justify-content:center; }
  .s3-card-preview .preview-icon svg { width:20px; height:20px; }
  .s3-card-info { padding:8px 10px; border-top:1px solid #E8F0E8; }
  .s3-card-name { font-size:11px; font-weight:600; color:#2D5A3D; margin-bottom:2px; }
  .s3-card-meta { font-size:9px; color:#6B8F71; display:flex; justify-content:space-between; }
  .s3-card-badge { font-size:8px; padding:1px 6px; border-radius:8px; background:#E8F5E9; color:#2E7D32; }

  .click-ripple { position:absolute; width:24px; height:24px; border-radius:50%; background:rgba(76,175,80,.3); border:2px solid rgba(76,175,80,.6); pointer-events:none; z-index:999; animation:ripple .6s ease-out forwards; }
  @keyframes ripple { 0%{transform:scale(0);opacity:1;} 100%{transform:scale(2.5);opacity:0;} }

  .cursor-pointer { position:absolute; z-index:1000; pointer-events:none; width:20px; height:20px; transition:left .6s cubic-bezier(.4,0,.2,1), top .6s cubic-bezier(.4,0,.2,1); opacity:0; }
  .cursor-pointer.show { opacity:1; }
  .cursor-pointer svg { width:20px; height:20px; filter:drop-shadow(1px 2px 2px rgba(0,0,0,.2)); }
</style>
</head>

<script>
const $ = id => document.getElementById(id);
const wait = ms => new Promise(r => setTimeout(r, ms));

// ── 打字效果 ──
function typeText(el, text, speed=22){
  return new Promise(resolve=>{
    let i=0;
    const cursor = document.createElement('span');
    cursor.className='typing-cursor';
    el.textContent='';
    el.appendChild(cursor);
    const iv = setInterval(()=>{
      if(i<text.length){
        el.insertBefore(document.createTextNode(text[i]), cursor);
        i++;
      } else { clearInterval(iv); cursor.remove(); resolve(); }
    }, speed);
  });
}

function typeHTML(el, html, speed=15){
  return new Promise(resolve=>{
    el.innerHTML='';
    const cursor = document.createElement('span');
    cursor.className='typing-cursor';
    el.appendChild(cursor);
    let i=0;
    const iv = setInterval(()=>{
      if(i<html.length){
        // handle HTML tags — insert them instantly
        if(html[i]==='<'){
          const end = html.indexOf('>',i);
          if(end!==-1){
            const frag = document.createRange().createContextualFragment(html.substring(i,end+1));
            el.insertBefore(frag,cursor);
            i=end+1;
            return;
          }
        }
        el.insertBefore(document.createTextNode(html[i]),cursor);
        i++;
      } else { clearInterval(iv); cursor.remove(); resolve(); }
    }, speed);
  });
}

function typeInput(el, text, speed=50){
  return new Promise(resolve=>{
    el.innerHTML='';
    el.classList.add('focused','has-text');
    let i=0;
    const cursor = document.createElement('span');
    cursor.className='typing-cursor';
    el.appendChild(cursor);
    const iv = setInterval(()=>{
      if(i<text.length){
        el.insertBefore(document.createTextNode(text[i]),cursor);
        i++;
      } else { clearInterval(iv); resolve(); }
    }, speed);
  });
}

// ══ SCREEN 2: Math Canvas ══
function initMathCanvas(){
  const canvas=$('mathCanvas');
  const rect=canvas.parentElement.getBoundingClientRect();
  canvas.width=rect.width||440; canvas.height=rect.height||280;
  const ctx=canvas.getContext('2d');
  const W=canvas.width, H=canvas.height, cx=W/2, cy=H/2;

  function drawGrid(){
    ctx.clearRect(0,0,W,H);
    ctx.strokeStyle='#E8F0E8'; ctx.lineWidth=1;
    for(let x=0;x<=W;x+=30){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();}
    for(let y=0;y<=H;y+=30){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}
    ctx.strokeStyle='#94B89A'; ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,cy);ctx.lineTo(W,cy);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx,0);ctx.lineTo(cx,H);ctx.stroke();
    ctx.fillStyle='#6B8F71'; ctx.font='10px JetBrains Mono';
    ctx.fillText('x',W-15,cy-8); ctx.fillText('y',cx+8,15); ctx.fillText('O',cx+5,cy+15);
    for(let i=-6;i<=6;i++){
      if(i===0) continue;
      const sx=cx+i*30, sy=cy-i*30;
      ctx.beginPath();ctx.moveTo(sx,cy-3);ctx.lineTo(sx,cy+3);ctx.stroke();
      ctx.fillText(i+'',sx-4,cy+15);
      if(i>-5&&i<5){ctx.beginPath();ctx.moveTo(cx-3,sy);ctx.lineTo(cx+3,sy);ctx.stroke();ctx.fillText(i+'',cx+8,sy+4);}
    }
  }

  let parabolaP=0, lineP=0, showInter=false, areaP=0;
  let animating=false, phase=0, t=0;

  function drawParabola(p){
    ctx.beginPath(); ctx.strokeStyle='#4CAF50'; ctx.lineWidth=2.5;
    const steps=Math.floor(p*200);
    for(let i=0;i<=steps;i++){const v=(i/200)*6-3;const x=cx+v*30;const y=cy-(v*v-4)*30;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
    ctx.stroke();
    if(p>=1){ctx.fillStyle='#4CAF50';ctx.font='bold 12px DM Sans';ctx.fillText('y = x\u00B2 \u2212 4',cx+100,cy-5*30+20);}
  }
  function drawLine(p){
    ctx.beginPath();ctx.strokeStyle='#FF7043';ctx.lineWidth=2.5;ctx.setLineDash([6,3]);
    const x1=cx+(-2)*30,y1=cy-((-2)*2-4)*30,x2=cx+4*30,y2=cy-(4*2-4)*30;
    ctx.moveTo(x1,y1);ctx.lineTo(x1+(x2-x1)*p,y1+(y2-y1)*p);ctx.stroke();ctx.setLineDash([]);
    if(p>=1){ctx.fillStyle='#FF7043';ctx.font='bold 12px DM Sans';ctx.fillText('y = 2x \u2212 4',cx+3.5*30,cy-2.5*30);}
  }
  function drawIntersections(s){
    if(!s) return;
    [{x:0,y:-4,l:'A(0,\u22124)'},{x:3,y:5,l:'B(3,5)'}].forEach(p=>{
      const sx=cx+p.x*30,sy=cy-p.y*30;
      ctx.beginPath();ctx.arc(sx,sy,5,0,Math.PI*2);ctx.fillStyle='#E53935';ctx.fill();
      ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.stroke();
      ctx.fillStyle='#C62828';ctx.font='bold 11px JetBrains Mono';ctx.fillText(p.l,sx+8,sy-8);
    });
  }
  function drawArea(p){
    if(p<=0) return;
    ctx.beginPath();ctx.globalAlpha=.15*p;ctx.fillStyle='#4CAF50';
    for(let i=0;i<=60;i++){const v=(i/60)*3;const x=cx+v*30;const y=cy-(2*v-4)*30;if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);}
    for(let i=60;i>=0;i--){const v=(i/60)*3;const x=cx+v*30;const y=cy-(v*v-4)*30;ctx.lineTo(x,y);}
    ctx.closePath();ctx.fill();ctx.globalAlpha=1;
    if(p>=1){ctx.fillStyle='#2E7D32';ctx.font='bold 12px DM Sans';ctx.fillText('S = 9/2',cx+1.2*30,cy+.5*30);}
  }

  function render(){drawGrid();if(parabolaP>0)drawParabola(parabolaP);if(lineP>0)drawLine(lineP);drawIntersections(showInter);drawArea(areaP);}

  function animate(){
    if(!animating) return;
    t+=.02;
    if(phase===0){parabolaP=Math.min(1,t/1);if(parabolaP>=1){phase=1;t=0;showStepAnim(0);}}
    else if(phase===1){lineP=Math.min(1,t/.8);if(lineP>=1){phase=2;t=0;showStepAnim(1);}}
    else if(phase===2){if(t>.3){showInter=true;phase=3;t=0;showStepAnim(2);}}
    else if(phase===3){areaP=Math.min(1,t/1);if(areaP>=1){phase=4;t=0;showStepAnim(3);}}
    else{animating=false;}
    render();
    if(animating) requestAnimationFrame(animate);
  }

  window.vizStart=function(){parabolaP=0;lineP=0;showInter=false;areaP=0;phase=0;t=0;animating=true;animate();};
  render();
}
