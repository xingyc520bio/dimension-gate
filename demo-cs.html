<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AI 跨境客服 - 动态演示</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#F0F4F8; min-height:100vh; display:flex; align-items:center; justify-content:center; font-family:'DM Sans','PingFang SC',sans-serif; overflow:hidden; }

  /* ── 笔记本外壳 ── */
  .laptop { position:relative; width:900px; }
  .laptop-screen { background:#fff; border-radius:12px; border:1px solid #E2E8F0; overflow:hidden; box-shadow: 0 25px 80px rgba(0,90,200,.08), 0 4px 20px rgba(0,0,0,.04); }
  .laptop-base { width:60%; height:12px; margin:0 auto; background:linear-gradient(180deg,#D8DEE6,#E8ECF0); border-radius:0 0 8px 8px; }

  /* ── 顶部栏 ── */
  .topbar { display:flex; align-items:center; justify-content:space-between; padding:10px 16px; background:#F8FAFC; border-bottom:1px solid #E2E8F0; }
  .topbar-left { display:flex; align-items:center; gap:8px; }
  .dot { width:8px; height:8px; border-radius:50%; }
  .dot-r { background:#ff5f57; } .dot-y { background:#ffbd2e; } .dot-g { background:#28c840; }
  .topbar-title { font-size:12px; color:#94A3B8; margin-left:12px; font-family:'JetBrains Mono',monospace; }
  .topbar-right { display:flex; gap:6px; align-items:center; }
  .status-dot { width:6px; height:6px; border-radius:50%; background:#22C55E; animation:pulse-dot 2s infinite; }
  .status-text { font-size:11px; color:#94A3B8; font-family:'JetBrains Mono',monospace; }
  @keyframes pulse-dot { 0%,100%{opacity:1;} 50%{opacity:.4;} }

  /* ── 主布局 ── */
  .app { display:flex; height:480px; }

  /* ── 左侧对话列表 ── */
  .sidebar { width:220px; background:#F8FAFC; border-right:1px solid #E2E8F0; display:flex; flex-direction:column; }
  .sidebar-header { padding:14px 16px; border-bottom:1px solid #E2E8F0; }
  .sidebar-header h3 { font-size:13px; color:#334155; font-weight:600; }
  .sidebar-stats { display:flex; gap:12px; margin-top:8px; }
  .stat { font-size:11px; font-family:'JetBrains Mono',monospace; }
  .stat-val { color:#2563EB; font-weight:700; } .stat-label { color:#94A3B8; margin-left:3px; }
  .conv-list { flex:1; overflow:hidden; padding:6px 8px; }
  .conv-item { display:flex; align-items:center; gap:10px; padding:10px 12px; border-radius:10px; margin-bottom:4px; cursor:pointer; transition:all .3s; opacity:0; transform:translateX(-20px); }
  .conv-item.show { opacity:1; transform:translateX(0); }
  .conv-item.active { background:#EFF6FF; border:1px solid #BFDBFE; }
  .conv-item:not(.active) { border:1px solid transparent; }
  .conv-item:not(.active):hover { background:#F1F5F9; }
  .conv-flag { font-size:20px; flex-shrink:0; }
  .conv-info { flex:1; min-width:0; }
  .conv-name { font-size:12px; font-weight:600; color:#1E293B; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .conv-preview { font-size:11px; color:#94A3B8; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
  .conv-meta { display:flex; flex-direction:column; align-items:flex-end; gap:4px; flex-shrink:0; }
  .conv-time { font-size:10px; color:#CBD5E1; font-family:'JetBrains Mono',monospace; }
  .conv-badge { width:16px; height:16px; border-radius:50%; background:#2563EB; font-size:9px; color:#fff; display:flex; align-items:center; justify-content:center; font-weight:700; animation:badge-pop .3s ease; }
  @keyframes badge-pop { 0%{transform:scale(0);} 60%{transform:scale(1.3);} 100%{transform:scale(1);} }

  /* ── 中间聊天区 ── */
  .chat { flex:1; display:flex; flex-direction:column; background:#fff; }
  .chat-header { padding:12px 20px; border-bottom:1px solid #E2E8F0; display:flex; align-items:center; justify-content:space-between; }
  .chat-user { display:flex; align-items:center; gap:10px; }
  .chat-user-flag { font-size:22px; }
  .chat-user-info h4 { font-size:13px; color:#1E293B; font-weight:600; }
  .chat-user-info span { font-size:11px; color:#94A3B8; font-family:'JetBrains Mono',monospace; }
  .chat-lang-tag { padding:3px 10px; border-radius:20px; font-size:10px; font-weight:600; font-family:'JetBrains Mono',monospace; background:#EFF6FF; color:#2563EB; border:1px solid #BFDBFE; }

  .chat-messages { flex:1; padding:20px; overflow:hidden; display:flex; flex-direction:column; gap:16px; background:#FAFBFC; }
  .msg { display:flex; gap:10px; align-items:flex-start; opacity:0; transform:translateY(15px); transition:all .4s ease; max-width:85%; }
  .msg.show { opacity:1; transform:translateY(0); }
  .msg-user { align-self:flex-end; flex-direction:row-reverse; }
  .msg-avatar { width:32px; height:32px; border-radius:10px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:14px; }
  .msg-user .msg-avatar { border-radius:50%; }
  .msg-bot .msg-avatar { background:#EFF6FF; }
  .avatar-svg { width:32px; height:32px; border-radius:50%; }
  .msg-bubble { padding:10px 14px; border-radius:14px; font-size:13px; line-height:1.6; }
  .msg-user .msg-bubble { background:#FFF7ED; color:#78350F; border:1px solid #FED7AA; border-top-right-radius:4px; }
  .msg-bot .msg-bubble { background:#EFF6FF; color:#1E3A5F; border:1px solid #BFDBFE; border-top-left-radius:4px; }
  .msg-bot .msg-bubble .typing-cursor { display:inline-block; width:2px; height:14px; background:#2563EB; margin-left:2px; animation:blink-cursor .6s infinite; vertical-align:text-bottom; }
  @keyframes blink-cursor { 0%,100%{opacity:1;} 50%{opacity:0;} }

  /* ── 底部输入 ── */
  .chat-input { padding:12px 20px; border-top:1px solid #E2E8F0; display:flex; align-items:center; gap:10px; background:#fff; }
  .chat-input-box { flex:1; background:#F8FAFC; border:1px solid #E2E8F0; border-radius:10px; padding:10px 14px; font-size:12px; color:#94A3B8; }
  .chat-send { width:34px; height:34px; border-radius:10px; background:#2563EB; display:flex; align-items:center; justify-content:center; color:#fff; font-size:14px; }

  /* ── 右侧面板 ── */
  .panel { width:200px; background:#F8FAFC; border-left:1px solid #E2E8F0; padding:16px; display:flex; flex-direction:column; gap:16px; }
  .panel-card { background:#fff; border:1px solid #E2E8F0; border-radius:12px; padding:14px; }
  .panel-card h5 { font-size:10px; color:#94A3B8; text-transform:uppercase; letter-spacing:.08em; margin-bottom:10px; font-family:'JetBrains Mono',monospace; }
  .lang-detect { display:flex; align-items:center; gap:8px; margin-bottom:8px; }
  .lang-icon { font-size:16px; }
  .lang-name { font-size:12px; color:#475569; font-weight:600; }
  .lang-conf { font-size:11px; color:#2563EB; font-family:'JetBrains Mono',monospace; margin-left:auto; }

  .sentiment-bar { height:6px; border-radius:3px; background:#E2E8F0; overflow:hidden; margin-top:6px; }
  .sentiment-fill { height:100%; border-radius:3px; transition:width 1s ease, background 1s ease; }

  /* 实时数据 */
  .live-stats { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
  .live-stat { text-align:center; padding:8px 4px; background:#fff; border-radius:8px; border:1px solid #E2E8F0; }
  .live-stat-val { font-size:16px; font-weight:700; color:#2563EB; font-family:'JetBrains Mono',monospace; }
  .live-stat-label { font-size:9px; color:#94A3B8; margin-top:2px; }
</style>
</head>
<body>

<div class="laptop">
  <div class="laptop-screen">
    <div class="topbar">
      <div class="topbar-left">
        <div class="dot dot-r"></div><div class="dot dot-y"></div><div class="dot dot-g"></div>
        <span class="topbar-title">维度之门 · 跨境智能客服系统</span>
      </div>
      <div class="topbar-right">
        <div class="status-dot"></div>
        <span class="status-text">系统运行正常</span>
      </div>
    </div>
    <div class="app">
      <!-- 左侧 -->
      <div class="sidebar">
        <div class="sidebar-header">
          <h3>全部会话</h3>
          <div class="sidebar-stats">
            <div class="stat"><span class="stat-val" id="online-count">0</span><span class="stat-label">在线</span></div>
            <div class="stat"><span class="stat-val" id="today-count">0</span><span class="stat-label">今日</span></div>
          </div>
        </div>
        <div class="conv-list" id="conv-list"></div>
      </div>

      <!-- 中间聊天 -->
      <div class="chat">
        <div class="chat-header">
          <div class="chat-user">
            <span class="chat-user-flag" id="chat-flag">🇨🇳</span>
            <div class="chat-user-info">
              <h4 id="chat-name">张明</h4>
              <span id="chat-platform">via 企业微信</span>
            </div>
          </div>
          <div class="chat-lang-tag" id="chat-lang">ZH 中文</div>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <div class="chat-input">
          <div class="chat-input-box">AI 正在自动回复中...</div>
          <div class="chat-send">↑</div>
        </div>
      </div>

      <!-- 右侧面板 -->
      <div class="panel">
        <div class="panel-card">
          <h5>语言识别</h5>
          <div class="lang-detect">
            <span class="lang-icon" id="detect-flag">🇨🇳</span>
            <span class="lang-name" id="detect-lang">中文</span>
            <span class="lang-conf" id="detect-conf">99.9%</span>
          </div>
          <div class="lang-detect">
            <span class="lang-icon">🤖</span>
            <span class="lang-name">回复语言</span>
            <span class="lang-conf" id="reply-lang">中文</span>
          </div>
        </div>

        <div class="panel-card">
          <h5>情绪分析</h5>
          <div class="lang-detect">
            <span class="lang-name" id="sentiment-label">积极</span>
            <span class="lang-conf" id="sentiment-val" style="color:#22C55E;">90%</span>
          </div>
          <div class="sentiment-bar"><div class="sentiment-fill" id="sentiment-fill" style="width:90%;background:#22C55E;"></div></div>
        </div>

        <div class="live-stats">
          <div class="live-stat">
            <div class="live-stat-val" id="stat-serving">0</div>
            <div class="live-stat-label">服务中</div>
          </div>
          <div class="live-stat">
            <div class="live-stat-val" id="stat-resp">0.0s</div>
            <div class="live-stat-label">平均响应</div>
          </div>
          <div class="live-stat">
            <div class="live-stat-val" id="stat-sat">0%</div>
            <div class="live-stat-label">满意度</div>
          </div>
          <div class="live-stat">
            <div class="live-stat-val" id="stat-langs">0</div>
            <div class="live-stat-label">语种数</div>
          </div>
        </div>
      </div>
    </div>
  </div>
  <div class="laptop-base"></div>
</div>

<script>
// ── SVG 头像生成 ──
function personSvg(skin, hair, bg){
  return `<svg class="avatar-svg" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg"><rect width="32" height="32" rx="16" fill="${bg}"/><circle cx="16" cy="12" r="5.5" fill="${skin}"/><ellipse cx="16" cy="26" rx="9" ry="7" fill="${skin}"/><ellipse cx="16" cy="8.5" rx="5.5" ry="3.5" fill="${hair}"/></svg>`;
}
const avatars = {
  cn: personSvg('#F5D0A9','#1a1a2e','#DBEAFE'),
  us: personSvg('#FDDCB5','#8B6914','#FEF3C7'),
  jp: personSvg('#F5D0A9','#0f0f1a','#E0E7FF'),
  sa: personSvg('#C8956C','#1a1a1a','#FEE2E2'),
  fr: personSvg('#FDDCB5','#6B3A2A','#F3E8FF'),
};

// ── 场景数据（顺序：中文 → 英语 → 日语 → 阿拉伯 → 法语） ──
const scenes = [
  {
    flag:'🇨🇳', name:'李工 · 恒源精密制造', platform:'via 企业微信',
    langTag:'ZH 中文', detectFlag:'🇨🇳', detectLang:'中文', detectConf:'99.9%', replyLang:'中文',
    sentiment:'积极', sentVal:'88%', sentColor:'#22C55E', sentWidth:'88%',
    avatarKey:'cn',
    messages:[
      { role:'user', text:'我们需要采购一批304不锈钢CNC精密零件，数量5000件，外径公差要求±0.02mm，表面粗糙度Ra0.8，能做吗？交期多久？' },
      { role:'bot', text:'李工您好！完全可以。304不锈钢CNC件，±0.02mm公差和Ra0.8光洁度均在我司五轴加工能力范围内。5000件预计交期18-22个工作日，首件3天内送检。批量单价约¥47.5/件（含三坐标全检报告）。需要我发送材质证书和工艺评审单到您邮箱吗？' },
    ]
  },
  {
    flag:'🇺🇸', name:'Jake Morrison', platform:'via Shopify',
    langTag:'EN → ZH 自动', detectFlag:'🇺🇸', detectLang:'英语', detectConf:'99.9%', replyLang:'English',
    sentiment:'积极', sentVal:'82%', sentColor:'#22C55E', sentWidth:'82%',
    avatarKey:'us',
    messages:[
      { role:'user', text:'Hey, I ordered 50 units for my store. Can I get bulk pricing and a custom invoice for tax purposes?' },
      { role:'bot', text:'Hi Jake! Absolutely. For 50+ units, I can offer 20% wholesale pricing — that brings your unit cost to $18.40. I\'ve generated a custom B2B invoice with your EIN on file. Check your email in 2 minutes. Want me to set up auto-reorder as well?' },
    ]
  },
  {
    flag:'🇯🇵', name:'Yuki Tanaka', platform:'via Shopify',
    langTag:'JA → ZH 自动', detectFlag:'🇯🇵', detectLang:'日语', detectConf:'99.2%', replyLang:'日本語',
    sentiment:'积极', sentVal:'86%', sentColor:'#22C55E', sentWidth:'86%',
    avatarKey:'jp',
    messages:[
      { role:'user', text:'すみません、注文した商品がまだ届いていないのですが、配送状況を確認していただけますか？' },
      { role:'bot', text:'Yuki様、ご連絡ありがとうございます。注文番号 #JP-20260305 を確認いたしました。現在、商品は東京税関を通過済みで、明日中にお届け予定です。追跡番号: TK-88291037' },
    ]
  },
  {
    flag:'🇸🇦', name:'Ahmed Al-Rashid', platform:'via WhatsApp',
    langTag:'AR → ZH 自动', detectFlag:'🇸🇦', detectLang:'阿拉伯语', detectConf:'98.7%', replyLang:'العربية',
    sentiment:'中立', sentVal:'72%', sentColor:'#EAB308', sentWidth:'72%',
    avatarKey:'sa',
    messages:[
      { role:'user', text:'مرحبًا، أريد أن أعرف هل يمكن شحن المنتجات إلى الرياض؟ وكم تستغرق مدة التوصيل؟' },
      { role:'bot', text:'مرحبًا أحمد! نعم، نقوم بالشحن إلى الرياض. مدة التوصيل ٥-٧ أيام عمل عبر أرامكس. الشحن مجاني للطلبات فوق ٥٠٠ ريال. هل تريد المتابعة بالطلب؟' },
    ]
  },
  {
    flag:'🇫🇷', name:'Claire Dubois', platform:'via Amazon EU',
    langTag:'FR → ZH 自动', detectFlag:'🇫🇷', detectLang:'法语', detectConf:'99.5%', replyLang:'Français',
    sentiment:'焦虑', sentVal:'58%', sentColor:'#F97316', sentWidth:'58%',
    avatarKey:'fr',
    messages:[
      { role:'user', text:'Bonjour, j\'ai reçu mon colis mais la taille ne correspond pas. Comment faire un échange ? C\'est assez urgent.' },
      { role:'bot', text:'Bonjour Claire, je comprends votre frustration. J\'ai initié un échange express pour vous — commande #EU-7842. Vous recevrez une étiquette de retour prépayée par email dans 5 minutes. La nouvelle taille sera expédiée aujourd\'hui même. Frais de retour: 0€.' },
    ]
  },
];

// ── 左侧对话列表（匹配新顺序） ──
const convData = [
  { flag:'🇨🇳', name:'李工 · 恒源精密', preview:'304不锈钢CNC件，公差±0.02...', time:'now', badge:'1' },
  { flag:'🇺🇸', name:'Jake Morrison', preview:'Can I get bulk pricing and...', time:'1m', badge:'1' },
  { flag:'🇯🇵', name:'Yuki Tanaka', preview:'注文した商品がまだ届いて...', time:'3m', badge:'1' },
  { flag:'🇸🇦', name:'Ahmed Al-Rashid', preview:'هل يمكن شحن المنتجات إلى...', time:'5m', badge:'1' },
  { flag:'🇫🇷', name:'Claire Dubois', preview:'la taille ne correspond pas...', time:'8m', badge:'1' },
  { flag:'🇧🇷', name:'Maria Silva', preview:'Vi esse produto no TikTok...', time:'12m', badge:'2' },
  { flag:'🇩🇪', name:'Hans Weber', preview:'Kann ich die Bestellung...', time:'15m', badge:'' },
  { flag:'🇰🇷', name:'김민지', preview:'배송 추적 번호를 알려주세요...', time:'18m', badge:'' },
];

const convList = document.getElementById('conv-list');
convData.forEach((c,i)=>{
  const div = document.createElement('div');
  div.className = 'conv-item' + (i===0?' active':'');
  div.dataset.index = i;
  div.innerHTML = `
    <span class="conv-flag">${c.flag}</span>
    <div class="conv-info"><div class="conv-name">${c.name}</div><div class="conv-preview">${c.preview}</div></div>
    <div class="conv-meta"><span class="conv-time">${c.time}</span>${c.badge?`<div class="conv-badge">${c.badge}</div>`:''}</div>
  `;
  convList.appendChild(div);
  setTimeout(()=>div.classList.add('show'), 300 + i*120);
});

// ── 动画计数器 ──
function animateCount(el, target, suffix='', duration=1500){
  let start=0; const step=Math.ceil(target/30);
  const iv = setInterval(()=>{
    start = Math.min(start+step, target);
    el.textContent = start + suffix;
    if(start>=target) clearInterval(iv);
  }, duration/30);
}
setTimeout(()=>{
  animateCount(document.getElementById('online-count'), 47);
  animateCount(document.getElementById('today-count'), 384);
  animateCount(document.getElementById('stat-serving'), 47);
  document.getElementById('stat-resp').textContent='0.8s';
  document.getElementById('stat-sat').textContent='97%';
  animateCount(document.getElementById('stat-langs'), 32);
},800);

// ── 打字效果 ──
function typeText(el, text, speed=25){
  return new Promise(resolve=>{
    let i=0;
    const cursor = document.createElement('span');
    cursor.className='typing-cursor';
    el.textContent='';
    el.appendChild(cursor);
    const iv = setInterval(()=>{
      if(i<text.length){
        el.insertBefore(document.createTextNode(text[i]), cursor);
        i++;
      } else {
        clearInterval(iv);
        cursor.remove();
        resolve();
      }
    }, speed);
  });
}

// ── 场景切换 ──
let currentScene = 0;

async function playScene(idx){
  const s = scenes[idx];
  const msgArea = document.getElementById('chat-messages');
  msgArea.innerHTML = '';

  // 更新 header
  document.getElementById('chat-flag').textContent = s.flag;
  document.getElementById('chat-name').textContent = s.name;
  document.getElementById('chat-platform').textContent = s.platform;
  document.getElementById('chat-lang').textContent = s.langTag;

  // 更新面板
  document.getElementById('detect-flag').textContent = s.detectFlag;
  document.getElementById('detect-lang').textContent = s.detectLang;
  document.getElementById('detect-conf').textContent = s.detectConf;
  document.getElementById('reply-lang').textContent = s.replyLang;
  document.getElementById('sentiment-label').textContent = s.sentiment;
  document.getElementById('sentiment-val').textContent = s.sentVal;
  document.getElementById('sentiment-val').style.color = s.sentColor;
  document.getElementById('sentiment-fill').style.width = s.sentWidth;
  document.getElementById('sentiment-fill').style.background = s.sentColor;

  // 高亮对话列表
  document.querySelectorAll('.conv-item').forEach((c,i)=>{
    c.classList.toggle('active', i===idx);
    if(i===idx){
      const badge = c.querySelector('.conv-badge');
      if(badge) badge.style.display='none';
    }
  });

  // 播放消息
  for(const msg of s.messages){
    const div = document.createElement('div');
    div.className = `msg msg-${msg.role}`;
    const avatarHtml = msg.role==='bot' ? '🤖' : avatars[s.avatarKey];
    div.innerHTML = `<div class="msg-avatar">${avatarHtml}</div><div class="msg-bubble"></div>`;
    msgArea.appendChild(div);
    await new Promise(r=>setTimeout(r, 200));
    div.classList.add('show');

    const bubble = div.querySelector('.msg-bubble');
    if(msg.role === 'bot'){
      await new Promise(r=>setTimeout(r, 600));
      await typeText(bubble, msg.text, 20);
    } else {
      bubble.textContent = msg.text;
    }
    await new Promise(r=>setTimeout(r, 400));
  }
}

// ── 自动轮播 ──
async function loop(){
  await playScene(currentScene);
  await new Promise(r=>setTimeout(r, 3500));
  currentScene = (currentScene + 1) % scenes.length;
  loop();
}

setTimeout(()=>loop(), 1500);
</script>

</body>
</html>
